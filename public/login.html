<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Hospitalar</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="icon" type="image/png" href="./imgs/logo.png">
</head>
<body>
  <nav>
      <div></div>
          <img src="imgs/logo.png" alt="Logo da Smart Waste Systems" class="logo">
      </div>

      <div class="titulo">
          <p>Smart Waste Systems</p>
      </div>

      <div class="links">
          <a href="index.html" class="escolhaLinks">Home</a>
          <a href="v1calculadora.html" class="escolhaLinks">Calculadora de Retorno</a>
          <a href="login.html" class="escolhaLinks login">Login</a> 
      </div>
    </nav>
    
    <div class="alerta_erro"> <!--Card de erro modal(ou seja esta oculto até ser chamado)-->
      <div class="card_erro" id="cardErro">
        <span id="fechar" onclick="sumirMensagem()">&times;</span><!--X para fechar o card de erro-->
        <span id="mensagem_erro"></span><!--Mensagem de erro que muda de acordo com os IFs do script-->
      </div>
    </div>

    
    <section class="card">
      <div class="forms">
        <form id="login-form" class="form">
          <h2>Login</h2>

          <input type="email" name="impemail" id="email_input" placeholder="Email" autocomplete="email" />
          
          <input type="password" name="impsenha" id="senha_input" placeholder="Senha" autocomplete="current-password" />
          
          <button type="button" id="btdlogin" onclick="entrar()">Entrar</button>
        </form>
        <p class="sem-cadastro">Não tenho cadastro!  <a href="cadastro.html">Cadastrar-se</a></p>
      </div>
  </section>

</body>
</html>
<script src="js/login.js"></script>
