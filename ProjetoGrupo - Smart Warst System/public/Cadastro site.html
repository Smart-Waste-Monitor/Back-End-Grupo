  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">

  <style>

<body onload="listar()">
  <nav>
    <div class="logo">
      <img src="imgs/logo.png" alt="Logo da Smart Waste Systems" height="100" width="100">
      <!-- Por que alt? E isso em várias imagens... Leitor de tela em resumo! -->
    </div>

    <div class="titulo">
      <p>Smart Waste Systems</p>
    </div>

    <div class="links">
      <a href="index.html" class="escolhaLinks">Home</a>
      <a href="#servicos" class="escolhaLinks">Serviços</a>
      <a href="#sobre-nos" class="escolhaLinks">Sobre Nós</a>
      <a href="#fundadores" class="escolhaLinks">Fundadores</a>
      <a href="#formulario" class="escolhaLinks">Contate-nos</a>
      <a href="v1calculadora.html" class="escolhaLinks">Calculadora Financeira</a>
      <a href="login.html" class="escolhaLinks login">Login</a>
      <!-- Nesse precisamos do login! Então confie. -->
    </div>
  </nav>

  <div class="alerta_erro"> <!--Card de erro modal(ou seja esta oculto até ser chamado)-->
    <div class="card_erro" id="cardErro">
      <span id="fechar" onclick="sumirMensagem()">&times;</span><!--X para fechar o card de erro-->
      <span id="mensagem_erro"></span><!--Mensagem de erro que muda de acordo com os IFs do script-->
    </div>
  </div>

  <section class="card"> <!--Card principal da tela-->
    <div class="forms">
      <form id="login-form" class="form"> <!--Tag de inicio do formulario do cadastro-->
        <h2>Cadastro</h2>
        <input type="text" id="nome_completo" placeholder="Nome Completo">
        <input type="password" id="senha_imp" placeholder="Senha">
        <input type="password" id="confirmar_senha" placeholder="Confirmar Senha">
        <input type="tel" id="telefone_imp" placeholder="Telefone">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="Cod_hospital_imp" placeholder="Código do hospital">

        <button type="button" onclick="cadastrar()">Cadastrar</button><!--botao de envio do cadastro-->
      </form>
    </div>
  </section>
</body>

</html>


<script>
  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    // aguardar();
    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_completo.value;
    var senhaVar = senha_imp.value;
    var confirmacaoSenhaVar = confirmar_senha.value;
    var telefoneVar = telefone_imp.value;
    var emailVar = email.value;
    var cod_hospVar = Cod_hospital_imp.value;


    var idEmpresaVincular;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      telefoneVar == "" ||
      confirmacaoSenhaVar == "" ||
      cod_hospVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;

      //Verificando se o nome é maior ou igual a um caractere
    } else if (nomeVar.length <= 1) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Nome com um ou menos caracteres)";
      finalizarAguardar();
      return false;

      //Verificando se há algum @ no email
    } else if (emailVar.indexOf('@') == -1) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Não contém arroba)";
      finalizarAguardar();
      return false;

      //Verificando se há algum . no email
    } else if (emailVar.indexOf('.') == -1) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Não contém .)";
      finalizarAguardar();
      return false;

      //Verificando se a senha é maior ou igual a 6 caracteres 
    } else if (senhaVar.length <= 6) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Senha com 6 ou menos digitos)";
      finalizarAguardar();
      return false;

      //Verificando se a senha e a confirmacão são iguais
    } else if (senhaVar != confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Não é igual a senha)";
      finalizarAguardar();
      return false;

    } else {
      // fecha em 5 segundos se não tiver erros
      setTimeout(sumirMensagem, 5000);
    }

    //for concertado para rodar todas as "empresas"
    let codigoValido = false;

    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo_ativacao == cod_hospVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].id;
        codigoValido = true;
        break;
      }
    }

    if (!codigoValido) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Código do hospital inválido.";
      return false;
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        telefoneServer: telefoneVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        cod_hospServer: cod_hospVar,

        idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  //função para remover os modais
  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
