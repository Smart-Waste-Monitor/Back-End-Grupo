    <h2 id="tituloGeral">Volume Geral de Resíduos</h2>
    <section class="indicadores">

        <div class="kpi">
            <span class="kpiTitulo">Biológico</span>

        <div class="kpi">

<script>

    var sensorDigital = new Chart(document.getElementById('sensorDigital').getContext('2d'), {
        type: 'bar',
        data: {
            datasets: [{
                label: 'Lixeira A',
                borderColor: '#63B1BC',
                backgroundColor: '#012790'
            },
            {
                label: 'Lixeira B',
                borderColor: '#63B1BC',
                backgroundColor: '#111827'
            }]
        },
        options: {
            scales: {
                x: {
                    beginAtZero: true
                },
                y: {
                    title: {
                        display: true,
                        text: '(0-1)'
                    },
                    beginAtZero: true
                }
            }
        }
    });

    var paginacao = {};
    var tempo = {};

    function obterDados(grafico, endpoint) {
        fetch('http://10.18.32.143:3300/sensores/' + endpoint)
            .then(response => response.json())
            .then(valores => {
                if (paginacao[endpoint] == null) {
                    paginacao[endpoint] = 0;
                }
                if (tempo[endpoint] == null) {
                    tempo[endpoint] = 0;
                }

                var ultimaPaginacao = paginacao[endpoint];
                paginacao[endpoint] = valores.length;
                valores = valores.slice(ultimaPaginacao);

                valores.forEach((valor) => {
                    if (grafico.data.labels.length == 10 && grafico.data.datasets[0].data.length == 10) {
                        grafico.data.labels.shift();
                        grafico.data.datasets[0].data.shift();
                    }

                    grafico.data.labels.push(tempo[endpoint]++);
                    grafico.data.datasets[0].data.push(parseFloat(valor));
                    grafico.update();
                });
            })
            .catch(error => console.error('Erro ao obter dados:', error));
    }

    setInterval(() => {
        ;
        obterDados(sensorDigital, 'digital');
    }, 1000);

    let bolean = document.querySelector(".bolean");
    let booleano = document.querySelector(".booleano")
    if (bolean.innerHTML == 'Não') {
        booleano.classList.remove("red");
        booleano.classList.add("green");
    } else {
        booleano.classList.add("red");
        booleano.classList.remove("green");
    }

</script>
